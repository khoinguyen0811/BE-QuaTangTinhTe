<section style="padding:50px 20px;">
    <div style="max-width:1100px;margin:0 auto;text-align:center;">
        <h2 style="font-size:2rem;font-weight:700;color:#333;margin-bottom:12px;">Sản phẩm nổi bật</h2>
        <p style="color:#888;margin-bottom:40px;">Những sản phẩm được yêu thích nhất</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;">
            <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.08);position:relative;">
                <div style="position:absolute;top:12px;left:12px;padding:4px 10px;background:#e74c3c;color:#fff;border-radius:4px;font-size:0.75rem;font-weight:600;">-20%</div>
                <img src="https://placehold.co/300x300/f5f5f5/999?text=SP+1" alt="Sản phẩm" style="width:100%;height:240px;object-fit:cover;display:block;">
                <div style="padding:16px;">
                    <h4 style="font-size:0.95rem;font-weight:600;color:#333;margin-bottom:6px;">Hộp quà cao cấp</h4>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span style="font-weight:700;color:#e74c3c;">280.000đ</span>
                        <span style="font-size:0.8rem;color:#bbb;text-decoration:line-through;">350.000đ</span>
                    </div>
                </div>
            </div>
            <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.08);">
                <img src="https://placehold.co/300x300/f5f5f5/999?text=SP+2" alt="Sản phẩm" style="width:100%;height:240px;object-fit:cover;display:block;">
                <div style="padding:16px;">
                    <h4 style="font-size:0.95rem;font-weight:600;color:#333;margin-bottom:6px;">Bộ quà tặng Tết</h4>
                    <div><span style="font-weight:700;color:#e74c3c;">520.000đ</span></div>
                </div>
            </div>
            <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.08);position:relative;">
                <div style="position:absolute;top:12px;left:12px;padding:4px 10px;background:#43e97b;color:#fff;border-radius:4px;font-size:0.75rem;font-weight:600;">HOT</div>
                <img src="https://placehold.co/300x300/f5f5f5/999?text=SP+3" alt="Sản phẩm" style="width:100%;height:240px;object-fit:cover;display:block;">
                <div style="padding:16px;">
                    <h4 style="font-size:0.95rem;font-weight:600;color:#333;margin-bottom:6px;">Quà doanh nghiệp</h4>
                    <div><span style="font-weight:700;color:#e74c3c;">890.000đ</span></div>
                </div>
            </div>
            <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.08);">
                <img src="https://placehold.co/300x300/f5f5f5/999?text=SP+4" alt="Sản phẩm" style="width:100%;height:240px;object-fit:cover;display:block;">
                <div style="padding:16px;">
                    <h4 style="font-size:0.95rem;font-weight:600;color:#333;margin-bottom:6px;">Set quà sinh nhật</h4>
                    <div><span style="font-weight:700;color:#e74c3c;">450.000đ</span></div>
                </div>
            </div>
        </div>
    </div>
</section>
